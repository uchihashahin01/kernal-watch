<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernel-Watch // Real-Time Security</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
        }

        h1 {
            border-bottom: 2px solid #00ff41;
            padding-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #161b22;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        th,
        td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #30363d;
        }

        th {
            background-color: #21262d;
            color: #c9d1d9;
            text-transform: uppercase;
        }

        tr:hover {
            background-color: #21262d;
        }

        .threat {
            background-color: rgba(255, 0, 0, 0.2) !important;
            color: #ff7b72;
            animation: flash 1s infinite;
        }

        @keyframes flash {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.8;
            }

            100% {
                opacity: 1;
            }
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }

        .status-allowed {
            background-color: rgba(0, 255, 65, 0.2);
            color: #3fb950;
        }

        .status-blocked {
            background-color: rgba(255, 0, 0, 0.2);
            color: #ff7b72;
            border: 1px solid #ff7b72;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Kernel-Watch // Real-Time Security</h1>
        <div class="stats-bar" style="display: flex; gap: 20px; margin-bottom: 20px;">
            <div style="background: #161b22; padding: 15px; border-radius: 5px; flex: 1; border: 1px solid #30363d;">
                <div style="color: #8b949e; font-size: 0.8em;">TOTAL SCANNED</div>
                <div id="stat-scanned" style="font-size: 1.5em; color: #58a6ff;">0</div>
            </div>
            <div style="background: #161b22; padding: 15px; border-radius: 5px; flex: 1; border: 1px solid #30363d;">
                <div style="color: #8b949e; font-size: 0.8em;">THREATS BLOCKED</div>
                <div id="stat-blocked" style="font-size: 1.5em; color: #ff7b72;">0</div>
            </div>
        </div>
        <p>System Integrity: <span style="color: #3fb950;">ACTIVE</span> | eBPF Probes: <span
                style="color: #3fb950;">CONNECTED</span></p>

        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>PID</th>
                    <th>Command</th>
                    <th>Filename</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="events-table">
                <!-- Events will be inserted here -->
            </tbody>
        </table>
    </div>

    <script>
        const socket = io();
        const table = document.getElementById('events-table');

        socket.on('connect', () => {
            console.log('Connected to server via WebSocket');
        });

        socket.on('update_stats', (stats) => {
            document.getElementById('stat-scanned').innerText = stats.total_scanned;
            document.getElementById('stat-blocked').innerText = stats.threats_blocked;
        });

        socket.on('new_event', (data) => {
            const row = table.insertRow(0); // Add to top

            if (data.is_threat) {
                row.classList.add('threat');
            }

            // Max 50 rows
            if (table.rows.length > 50) {
                table.deleteRow(50);
            }

            const statusHtml = data.is_threat ?
                '<span class="status-badge status-blocked">BLOCKED</span>' :
                '<span class="status-badge status-allowed">ALLOWED</span>';

            row.innerHTML = `
                <td>${data.timestamp}</td>
                <td>${data.pid}</td>
                <td>${data.comm}</td>
                <td>${data.fname}</td>
                <td>${statusHtml}</td>
            `;
        });
    </script>
</body>

</html>
